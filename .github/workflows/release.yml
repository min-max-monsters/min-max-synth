name: Release

on:
    push:
        branches: [ main ]
        tags: [ "v*" ]
    workflow_dispatch:

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: 0

jobs:
    build:
        name: Build (${{ matrix.name }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: macos-arm64
                      os: macos-14
                      target: aarch64-apple-darwin
                    - name: linux-x86_64
                      os: ubuntu-22.04
                      target: x86_64-unknown-linux-gnu
                    - name: windows-x86_64
                      os: windows-2022
                      target: x86_64-pc-windows-msvc
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v4

            - name: Compute version string
              id: version
              shell: bash
              run: |
                  set -euo pipefail
                  base_ver=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
                  if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
                    ver="${GITHUB_REF#refs/tags/v}"
                  else
                    short_sha=$(git rev-parse --short HEAD)
                    ver="${base_ver}-nightly.${short_sha}"
                  fi
                  echo "version=${ver}" >> "$GITHUB_OUTPUT"
                  echo "Resolved version: ${ver}"

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install Linux build dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y --no-install-recommends \
                    libasound2-dev \
                    libjack-jackd2-dev \
                    libx11-dev libx11-xcb-dev libxcb1-dev libxcb-icccm4-dev libxcb-dri2-0-dev \
                    libxcb-xkb-dev libxcb-shape0-dev libxcb-xfixes0-dev libxcb-cursor-dev \
                    libxkbcommon-dev libxkbcommon-x11-dev \
                    libgl1-mesa-dev libglu1-mesa-dev \
                    libwayland-dev

            - name: Install nih-plug bundler
              run: cargo install --git https://github.com/robbert-vdh/nih-plug.git
                  cargo-nih-plug --locked

            - name: Run tests
              run: cargo test --lib --target ${{ matrix.target }}

            - name: Bundle plugins (CLAP + VST3)
              run: cargo nih-plug bundle min_max_synth --release --target ${{ matrix.target }}
              env:
                  MIN_MAX_VERSION: ${{ steps.version.outputs.version }}

            - name: Build standalone binary
              run: cargo build --release --bin min_max_standalone --target ${{ matrix.target
                  }}
              env:
                  MIN_MAX_VERSION: ${{ steps.version.outputs.version }}

            - name: Stage artifacts
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p staging
                  cp -R target/bundled/. staging/
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    cp target/${{ matrix.target }}/release/min_max_standalone.exe staging/
                  else
                    cp target/${{ matrix.target }}/release/min_max_standalone staging/
                  fi
                  cp README.md LICENSE staging/ 2>/dev/null || true

            - name: Create archive
              shell: bash
              run: |
                  set -euo pipefail
                  ver="${{ steps.version.outputs.version }}"
                  archive="min_max_synth-${ver}-${{ matrix.name }}"
                  if [ "${{ runner.os }}" = "Windows" ]; then
                    7z a "${archive}.zip" ./staging/*
                    echo "ARCHIVE=${archive}.zip" >> "$GITHUB_ENV"
                  else
                    tar -czf "${archive}.tar.gz" -C staging .
                    echo "ARCHIVE=${archive}.tar.gz" >> "$GITHUB_ENV"
                  fi

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: min_max_synth-${{ matrix.name }}
                  path: ${{ env.ARCHIVE }}
                  if-no-files-found: error

    release:
        name: Publish release
        needs: build
        runs-on: ubuntu-22.04
        if: github.event_name != 'pull_request'
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  merge-multiple: true

            - name: List artifacts
              run: ls -la dist

            - name: Determine release metadata
              id: meta
              shell: bash
              run: |
                  set -euo pipefail
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                    tag="${GITHUB_REF#refs/tags/}"
                    echo "tag=${tag}" >> "$GITHUB_OUTPUT"
                    echo "name=${tag}" >> "$GITHUB_OUTPUT"
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                  else
                    short_sha="$(git rev-parse --short HEAD)"
                    echo "tag=nightly" >> "$GITHUB_OUTPUT"
                    echo "name=Nightly (${short_sha})" >> "$GITHUB_OUTPUT"
                    echo "prerelease=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Move nightly tag
              if: steps.meta.outputs.tag == 'nightly'
              run: |
                  set -euo pipefail
                  git tag -f nightly
                  git push -f origin nightly

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.meta.outputs.tag }}
                  name: ${{ steps.meta.outputs.name }}
                  prerelease: ${{ steps.meta.outputs.prerelease }}
                  generate_release_notes: true
                  files: dist/*
